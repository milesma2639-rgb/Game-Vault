<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Vault - Official Game Sites</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Arcade Vault</h1>
      <p>Launch and preview official browser game websites from one place.</p>
    </header>

    <main id="game-grid"></main>

    <template id="game-card-template">
      <section class="card">
        <h2 class="game-title"></h2>
        <p class="game-description"></p>
        <div class="button-row">
          <a class="play-link" target="_blank" rel="noopener noreferrer">Open Official Site</a>
        </div>
        <div class="embed-wrap">
          <iframe class="game-frame" loading="lazy" referrerpolicy="no-referrer" title="Game preview"></iframe>
          <p class="embed-note">
            Some websites block embedding. If preview is blank, use <strong>Open Official Site</strong>.
          </p>
        </div>
      </section>
    </template>

    <footer>
      <small>
        This portal links to official external websites. It does not bypass access controls,
        filters, or account/security policies.
      </small>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
